<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile Card</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      background: linear-gradient(to bottom, #ffffff 0%, #f5f7ff 100%);
      border: 3px solid #667eea;
      width: 300px;
      margin: 0 auto;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 8px 32px rgba(102, 126, 234, 0.4);
    }
    .avatar {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 50%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      color: white;
      border: 4px solid #f093fb;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.5);
      overflow: hidden;
    }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }
    h2 {
      color: #667eea;
      font-size: 28px;
      margin: 15px 0;
    }
    h3 {
      color: #764ba2;
      margin-top: 20px;
    }
    .course {
      color: #f093fb;
      font-weight: bold;
      font-size: 16px;
    }
    p {
      color: #555;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    th {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 10px 5px;
      font-weight: bold;
    }
    tr:nth-child(even) {
      background-color: #f0f4ff;
    }
    tr:nth-child(odd) {
      background-color: #ffffff;
    }
    td {
      border: 1px solid #ddd;
      padding: 8px 5px;
      color: #333;
    }
    ul {
      list-style-type: none;
      padding: 0;
    }
    li {
      display: inline-block;
      margin: 8px;
      padding: 10px 15px;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      border-radius: 20px;
      font-weight: bold;
      box-shadow: 0 4px 12px rgba(240, 147, 251, 0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    li:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(240, 147, 251, 0.5);
    }
    .footer {
      margin-top: 25px;
      padding-top: 20px;
      border-top: 2px solid #667eea;
    }
    a {
      margin: 0 10px;
      text-decoration: none;
      color: white;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 10px 20px;
      border-radius: 20px;
      display: inline-block;
      font-weight: bold;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }
    a:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
    }
    .education {
      margin-top: 20px;
      padding: 15px;
      background-color: #f5f7ff;
      border-left: 4px solid #764ba2;
      border-radius: 5px;
    }
    nav {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 15px;
      text-align: center;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }
    nav a {
      margin: 0 15px;
      color: white;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
      transition: opacity 0.3s ease;
    }
    nav a:hover {
      opacity: 0.8;
    }
    nav a.active {
      border-bottom: 3px solid #f093fb;
      padding-bottom: 5px;
    }
    .social-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .social-icon {
      width: 35px;
      height: 35px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      font-size: 16px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }
    .social-icon:hover {
      transform: translateY(-5px) scale(1.1);
      box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
    }
  </style>
</head>
<body>

  <div class="footer">
    <div class="social-links">

      <a href="https://facebook.com/Obale Joseph Gabriel" class="social-icon" title="Facebook"><i class="fab fa-facebook"></i></a>

      <a href="https://youtube.com/@Gabriel-v5c3e" class="social-icon" title="YouTube"><i class="fab fa-youtube"></i></a>

</body>
</html>
